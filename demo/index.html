<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SportsSync Match Context Demo</title>
  <meta name="description" content="Interactive demo of one SportsSync match-context response rendered as a real page.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,600;6..72,700&family=Public+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8f6f1;
      --panel: #ffffff;
      --panel-soft: #f3efe6;
      --border: #e3dccd;
      --text: #1f1d18;
      --muted: #5f574a;
      --accent: #0f6b5f;
      --good: #1b7a3b;
      --warn: #9a6a14;
      --bad: #8b2d2d;
      --body: "Public Sans", "Avenir Next", sans-serif;
      --display: "Newsreader", Georgia, serif;
      --mono: "JetBrains Mono", "SF Mono", Menlo, monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--body);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 920px;
      margin: 0 auto;
      padding: 0 20px 28px;
    }

    header {
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .brand {
      color: var(--text);
      text-decoration: none;
      font-family: var(--display);
      font-size: 30px;
      font-weight: 700;
    }

    .back {
      font-size: 14px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .hero {
      padding: 24px 0 14px;
    }

    .hero h1 {
      font-family: var(--display);
      font-size: clamp(32px, 5.6vw, 52px);
      line-height: 1.06;
      margin-bottom: 8px;
    }

    .hero p {
      color: var(--muted);
      max-width: 60ch;
    }

    .controls {
      margin: 16px 0 20px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .match-btn {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
    }

    .match-btn.active {
      border-color: var(--accent);
      background: var(--panel-soft);
      color: var(--accent);
    }

    .runtime {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
      min-height: 18px;
      font-family: var(--mono);
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel);
      padding: 16px;
    }

    .card h2 {
      font-size: 17px;
      margin-bottom: 10px;
    }

    .matchup-title {
      font-family: var(--display);
      font-size: 40px;
      line-height: 1.03;
      margin-bottom: 6px;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .meta-item {
      background: var(--panel-soft);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 8px;
    }

    .meta-item dt {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 2px;
    }

    .meta-item dd {
      font-size: 14px;
      color: var(--text);
      font-weight: 600;
      margin: 0;
    }

    .line-anchor {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 8px;
    }

    .line-anchor .pill {
      background: var(--panel-soft);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 10px;
    }

    .line-anchor .label {
      display: block;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 2px;
    }

    .line-anchor .value {
      font-family: var(--mono);
      font-size: 22px;
      color: var(--text);
    }

    .line-note {
      font-size: 14px;
      color: var(--muted);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      text-align: left;
      padding: 9px 6px;
      border-bottom: 1px solid var(--border);
    }

    th {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 700;
    }

    td.mono { font-family: var(--mono); }

    .muted { color: var(--muted); }

    .status {
      display: inline-flex;
      align-items: center;
      font-size: 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      padding: 4px 9px;
      font-family: var(--mono);
    }

    .status-fresh { color: var(--good); border-color: #c6e2cf; background: #eff8f2; }
    .status-older { color: var(--warn); border-color: #eadbbb; background: #fbf6ea; }
    .status-unavailable { color: var(--bad); border-color: #e8c2c2; background: #fbefef; }

    .list {
      list-style: none;
      display: grid;
      gap: 8px;
    }

    .list li {
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel-soft);
      font-size: 15px;
    }

    .loading,
    .error {
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel);
      color: var(--muted);
      font-size: 14px;
    }

    .error { color: var(--bad); }

    @media (max-width: 760px) {
      .meta,
      .line-anchor {
        grid-template-columns: 1fr;
      }

      .matchup-title {
        font-size: 34px;
      }

      th, td {
        padding-left: 4px;
        padding-right: 4px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a class="brand" href="/">SportsSync</a>
      <a class="back" href="/">Back to main site</a>
    </header>

    <section class="hero">
      <h1>Live Match Context Demo</h1>
      <p>Pick a match and watch one response render into a usable game view.</p>
    </section>

    <div class="controls">
      <button class="match-btn active" data-match="b193b51f-cbed-4398-a297-237dd3322607">EPL · Arsenal vs Man City</button>
      <button class="match-btn" data-match="b42fe447-b2b1-485f-ae6d-1559ee2b57c7">WC26 · USA vs Mexico</button>
      <button class="match-btn" data-match="d6742e61-2457-43fd-aa3f-e61f6a76c7af">NBA · Lakers vs Celtics</button>
      <button class="match-btn" data-match="c94d7e01-333d-41cd-a67d-cc0285fa7f28">WC26 · England vs Brazil</button>
    </div>

    <div id="runtime" class="runtime"></div>
    <main id="preview" class="stack"></main>
  </div>

  <script>
    const API_KEY = 'sk_test_sportsync_beta_001';
    const BASE_URL = 'https://hylnixnuabtnmjcdnujm.supabase.co/functions/v1/match-context';
    const previewEl = document.getElementById('preview');
    const runtimeEl = document.getElementById('runtime');

    const sections = ['market', 'form', 'h2h', 'injuries', 'players', 'trends', 'live_state'];

    document.querySelectorAll('.match-btn').forEach((button) => {
      button.addEventListener('click', () => {
        document.querySelectorAll('.match-btn').forEach((x) => x.classList.remove('active'));
        button.classList.add('active');
        loadMatch(button.dataset.match);
      });
    });

    function readAveragePoints(formSection) {
      if (!formSection || !formSection.available) return null;
      const home = formSection.home?.avg_points_scored;
      const away = formSection.away?.avg_points_scored;
      if (typeof home !== 'number' || typeof away !== 'number') return null;
      return Number((home + away).toFixed(1));
    }

    function formatNumber(value, digits = 1) {
      if (typeof value !== 'number' || !Number.isFinite(value)) return 'n/a';
      return value.toFixed(digits);
    }

    function freshnessBadge(status) {
      const normalized = typeof status === 'string' ? status.toLowerCase() : 'unavailable';
      const cls = normalized === 'fresh' ? 'status-fresh' : normalized === 'stale' ? 'status-older' : 'status-unavailable';
      const label = normalized === 'fresh' ? 'updated' : normalized === 'stale' ? 'older' : 'missing';
      return `<span class="status ${cls}">${label}</span>`;
    }

    function renderMetaCard(match, home, away) {
      const kickoff = new Date(match.start_time);
      return `
        <section class="card">
          <h2>Match</h2>
          <div class="matchup-title">${home.name} vs ${away.name}</div>
          <p class="muted">${match.league_name || match.league || 'League'} · ${String(match.status || 'scheduled').replaceAll('_', ' ')}</p>
          <dl class="meta">
            <div class="meta-item"><dt>Kickoff</dt><dd>${Number.isNaN(kickoff.getTime()) ? 'TBD' : kickoff.toLocaleString()}</dd></div>
            <div class="meta-item"><dt>Venue</dt><dd>${match.venue ? `${match.venue.name}, ${match.venue.city}` : 'TBD'}</dd></div>
            <div class="meta-item"><dt>Round</dt><dd>${match.stage ? String(match.stage).replaceAll('_', ' ') : 'n/a'}</dd></div>
          </dl>
        </section>
      `;
    }

    function renderLineAnchor(data) {
      const line = data.market?.available ? data.market.consensus?.total : null;
      const average = readAveragePoints(data.form);
      const lineNumber = typeof line === 'number' ? line : null;
      const gap = lineNumber != null && average != null ? Number((average - lineNumber).toFixed(1)) : null;

      const gapText = gap == null
        ? 'Line anchor is not available for this match.'
        : `Average is ${formatNumber(average)}. Line is ${formatNumber(lineNumber)}. Gap is ${gap > 0 ? '+' : ''}${formatNumber(gap)}.`;

      return `
        <section class="card">
          <h2>Line Anchor</h2>
          <div class="line-anchor">
            <div class="pill"><span class="label">Rolling Average</span><span class="value">${average == null ? 'n/a' : formatNumber(average)}</span></div>
            <div class="pill"><span class="label">Tonight's Line</span><span class="value">${lineNumber == null ? 'n/a' : formatNumber(lineNumber)}</span></div>
            <div class="pill"><span class="label">Gap</span><span class="value">${gap == null ? 'n/a' : `${gap > 0 ? '+' : ''}${formatNumber(gap)}`}</span></div>
          </div>
          <p class="line-note">${gapText}</p>
        </section>
      `;
    }

    function renderMarket(data) {
      if (!data.market?.available) {
        return `
          <section class="card">
            <h2>Market</h2>
            <p class="muted">Market data is not available for this match.</p>
          </section>
        `;
      }

      const c = data.market.consensus || {};
      return `
        <section class="card">
          <h2>Market ${freshnessBadge(data.metadata?.data_freshness?.market?.status)}</h2>
          <table>
            <thead>
              <tr><th>Field</th><th>Value</th><th>Juice</th></tr>
            </thead>
            <tbody>
              <tr><td>Spread</td><td class="mono">${c.spread == null ? 'n/a' : c.spread}</td><td class="mono">${c.spread_juice || 'n/a'}</td></tr>
              <tr><td>Total</td><td class="mono">${c.total == null ? 'n/a' : c.total}</td><td class="mono">${c.total_juice || 'n/a'}</td></tr>
              <tr><td>Home ML</td><td class="mono">${c.home_ml == null ? 'n/a' : c.home_ml}</td><td class="mono">-</td></tr>
              <tr><td>Away ML</td><td class="mono">${c.away_ml == null ? 'n/a' : c.away_ml}</td><td class="mono">-</td></tr>
              <tr><td>Draw ML</td><td class="mono">${c.draw_ml == null ? 'n/a' : c.draw_ml}</td><td class="mono">-</td></tr>
            </tbody>
          </table>
        </section>
      `;
    }

    function renderForm(data, homeName, awayName) {
      if (!data.form?.available) {
        return `
          <section class="card">
            <h2>Form</h2>
            <p class="muted">Form data is not available for this match.</p>
          </section>
        `;
      }

      const home = data.form.home || {};
      const away = data.form.away || {};

      return `
        <section class="card">
          <h2>Form</h2>
          <table>
            <thead>
              <tr><th>Team</th><th>Last 5</th><th>Last 10</th><th>Rest</th></tr>
            </thead>
            <tbody>
              <tr><td>${homeName}</td><td class="mono">${home.last_5 || 'n/a'}</td><td class="mono">${home.last_10_record || 'n/a'}</td><td class="mono">${home.rest_days == null ? 'n/a' : `${home.rest_days}d`}</td></tr>
              <tr><td>${awayName}</td><td class="mono">${away.last_5 || 'n/a'}</td><td class="mono">${away.last_10_record || 'n/a'}</td><td class="mono">${away.rest_days == null ? 'n/a' : `${away.rest_days}d`}</td></tr>
            </tbody>
          </table>
        </section>
      `;
    }

    function renderInjuries(data, homeName, awayName) {
      if (!data.injuries?.available) {
        return `
          <section class="card">
            <h2>Injuries</h2>
            <p class="muted">Injury data is not available for this match.</p>
          </section>
        `;
      }

      const home = (data.injuries.home?.players || []).map((p) => `${homeName}: ${p.name} (${p.status || 'unknown'})`);
      const away = (data.injuries.away?.players || []).map((p) => `${awayName}: ${p.name} (${p.status || 'unknown'})`);
      const rows = [...home, ...away].slice(0, 10);

      return `
        <section class="card">
          <h2>Injuries ${freshnessBadge(data.metadata?.data_freshness?.injuries?.status)}</h2>
          ${rows.length === 0 ? '<p class="muted">No listed injuries in this response.</p>' : `<ul class="list">${rows.map((row) => `<li>${row}</li>`).join('')}</ul>`}
        </section>
      `;
    }

    function renderTrends(data, homeName, awayName) {
      if (!data.trends?.available) {
        return `
          <section class="card">
            <h2>Trends</h2>
            <p class="muted">Trend data is not available for this match.</p>
          </section>
        `;
      }

      const home = (data.trends.home?.situational || []).map((t) => `${homeName}: ${t.label} (${t.value || 'n/a'})`);
      const away = (data.trends.away?.situational || []).map((t) => `${awayName}: ${t.label} (${t.value || 'n/a'})`);
      const rows = [...home, ...away].slice(0, 8);

      return `
        <section class="card">
          <h2>Trends</h2>
          ${rows.length === 0 ? '<p class="muted">No trends listed in this response.</p>' : `<ul class="list">${rows.map((row) => `<li>${row}</li>`).join('')}</ul>`}
        </section>
      `;
    }

    function renderAvailability(data) {
      const items = sections.map((key) => {
        const available = !!data[key]?.available;
        return `<li>${key.replace('_', ' ')}: <strong>${available ? 'ready' : 'not included'}</strong></li>`;
      });

      return `
        <section class="card">
          <h2>Sections In This Response</h2>
          <ul class="list">${items.join('')}</ul>
        </section>
      `;
    }

    function renderPage(data) {
      const match = data.match || {};
      const home = data.teams?.home || { name: 'Home' };
      const away = data.teams?.away || { name: 'Away' };

      previewEl.innerHTML = [
        renderMetaCard(match, home, away),
        renderLineAnchor(data),
        renderMarket(data),
        renderForm(data, home.name, away.name),
        renderInjuries(data, home.name, away.name),
        renderTrends(data, home.name, away.name),
        renderAvailability(data),
      ].join('');
    }

    async function loadMatch(matchId) {
      previewEl.innerHTML = '<div class="loading">Loading match data...</div>';
      runtimeEl.textContent = '';

      try {
        const started = performance.now();
        const response = await fetch(`${BASE_URL}?match_id=${matchId}`, {
          headers: { 'x-api-key': API_KEY },
        });
        const payload = await response.json();
        const elapsed = Math.round(performance.now() - started);

        if (!response.ok || payload.error) {
          const message = payload?.error?.message || `Request failed (${response.status})`;
          previewEl.innerHTML = `<div class="error">${message}</div>`;
          return;
        }

        runtimeEl.textContent = `page ${elapsed}ms · api ${payload.metadata?.response_time_ms ?? 'n/a'}ms · updated ${new Date(payload.metadata?.generated_at || Date.now()).toLocaleTimeString()}`;
        renderPage(payload);
      } catch (error) {
        previewEl.innerHTML = `<div class="error">${error.message || 'Could not load this match.'}</div>`;
      }
    }

    loadMatch('b193b51f-cbed-4398-a297-237dd3322607');
  </script>
</body>
</html>
