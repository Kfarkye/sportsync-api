<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">
  <meta name="theme-color" content="#f4f6f9">
  <link rel="manifest" href="/manifest.webmanifest">
  <link rel="shortcut icon" href="/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
  <link rel="icon" type="image/png" sizes="96x96" href="/icons/icon-96.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192.png">
  <link rel="preload" as="fetch" href="/manifest.webmanifest" crossorigin="anonymous">
  <link rel="preload" as="image" href="/icons/icon-192.png" importance="high">
  <link rel="preload" as="image" href="/icons/icon-512.png" importance="high">
  <title>SportsSync Demo</title>
  <meta name="description" content="See one SportsSync match context response rendered as a readable game page.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,600;6..72,700&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --bg: #f4f6f9;
      --surface: rgba(255, 255, 255, 0.78);
      --panel-soft: #f1f4f9;
      --border: rgba(17, 24, 39, 0.08);
      --text: #0f172a;
      --muted: #64748b;
      --accent: #1d4ed8;
      --good: #16a34a;
      --warn: #b45309;
      --bad: #be123c;
      --shadow: 0 16px 40px rgba(2, 6, 23, 0.08);
      --body: "Inter", "Avenir Next", "SF Pro Text", sans-serif;
      --display: "Newsreader", "Times New Roman", serif;
      --mono: "JetBrains Mono", "SF Mono", Menlo, monospace;
    }

    html {
      background: radial-gradient(1200px 700px at 25% -5%, #dbeafe 0%, transparent 55%),
                  radial-gradient(1100px 600px at 90% 0%, #e9d5ff 0%, transparent 45%),
                  #f4f6f9;
    }

    body {
      margin: 0;
      font-family: var(--body);
      color: var(--text);
      line-height: 1.45;
      -webkit-font-smoothing: antialiased;
    }

    .shell {
      min-height: 100vh;
      padding: 28px 16px 40px;
    }

    .container {
      max-width: 980px;
      margin: 0 auto;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }

    .brand {
      text-decoration: none;
      font-family: var(--display);
      font-weight: 700;
      font-size: 34px;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1;
    }

    .links {
      display: flex;
      gap: 16px;
      align-items: center;
    }

    .links a {
      color: var(--accent);
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
    }

    .hero {
      border-radius: 18px;
      background: linear-gradient(160deg, rgba(30, 64, 175, 0.1), rgba(255, 255, 255, 0.65));
      border: 1px solid var(--border);
      padding: 18px;
      backdrop-filter: blur(6px);
    }

    .hero h1 {
      margin: 0;
      font-family: var(--display);
      font-size: clamp(34px, 5.5vw, 56px);
      line-height: 1.05;
      letter-spacing: -0.015em;
    }

    .hero p {
      margin: 8px 0 0;
      color: var(--muted);
      max-width: 68ch;
      font-size: 16px;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 18px;
    }

    .match-btn {
      border: 1px solid var(--border);
      background: var(--surface);
      color: #0f172a;
      padding: 10px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .match-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(29, 78, 216, 0.5);
    }

    .match-btn.active {
      border-color: var(--accent);
      background: #e0ecff;
      color: #1e3a8a;
    }

    .runtime {
      margin-top: 12px;
      margin-bottom: 12px;
      min-height: 22px;
      color: var(--muted);
      font-size: 12px;
      font-family: var(--mono);
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    .card {
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--surface);
      padding: 16px 16px 14px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .card h2 {
      margin: 0 0 12px;
      font-size: 17px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .muted {
      color: var(--muted);
    }

    .matchup-title {
      margin: 2px 0 8px;
      font-family: var(--display);
      font-size: clamp(28px, 5vw, 44px);
      line-height: 1.04;
      letter-spacing: -0.015em;
    }

    .status-row {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .meta,
    .line-anchor {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .meta-item,
    .pill {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      background: var(--panel-soft);
      min-height: 64px;
    }

    .meta-item dt,
    .pill .label {
      margin: 0 0 4px;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 700;
      font-family: var(--mono);
    }

    .meta-item dd,
    .pill .value {
      margin: 0;
      font-weight: 700;
      color: var(--text);
      font-size: 16px;
      line-height: 1.2;
    }

    .pill .value {
      font-family: var(--mono);
      font-size: 22px;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 14px;
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    th, td {
      padding: 11px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    th {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      text-align: left;
      background: #f8fbff;
      font-weight: 700;
      border-bottom: 1px solid var(--border);
    }

    tr:last-child td {
      border-bottom: none;
    }

    td.mono {
      font-family: var(--mono);
      color: #334155;
    }

    .list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 8px;
    }

    .list li {
      margin: 0;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel-soft);
      padding: 10px;
      font-size: 14px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      border: 1px solid var(--border);
      padding: 4px 10px;
      font-size: 11px;
      font-family: var(--mono);
      font-weight: 600;
      text-transform: lowercase;
    }

    .status-fresh { color: #166534; background: #ecfdf3; border-color: #bbf7d0; }
    .status-older { color: #92400e; background: #fffbeb; border-color: #fde68a; }
    .status-unavailable { color: #be123c; background: #fef2f2; border-color: #fecdd3; }

    .loading,
    .error {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--surface);
      padding: 18px;
      color: var(--muted);
      font-size: 14px;
      box-shadow: var(--shadow);
    }

    .error { color: var(--bad); }

    @media (max-width: 760px) {
      .meta,
      .line-anchor {
        grid-template-columns: 1fr;
      }

      .matchup-title {
        font-size: 30px;
      }

      .hero {
        padding: 14px;
      }

      .hero h1 {
        font-size: clamp(30px, 9vw, 42px);
      }

      th, td {
        padding: 10px 8px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="container">
      <header>
        <a class="brand" href="/">SportsSync</a>
        <nav class="links">
          <a href="/">Main Site</a>
          <a href="/docs/index.html">Docs</a>
          <a href="mailto:api@sportsync.io?subject=SportsSync%20Sandbox%20Access">Start Free</a>
        </nav>
      </header>

      <section class="hero">
        <h1>Live Match Context Demo</h1>
        <p>Pick a sample match to see a real v1 response rendered in a product-style view. This demo uses a locked server proxy, so no key is shown in browser code.</p>
        <div class="controls">
          <button class="match-btn active" data-match="b193b51f-cbed-4398-a297-237dd3322607">EPL · Arsenal vs Man City</button>
          <button class="match-btn" data-match="b42fe447-b2b1-485f-ae6d-1559ee2b57c7">WC26 · USA vs Mexico</button>
          <button class="match-btn" data-match="d6742e61-2457-43fd-aa3f-e61f6a76c7af">NBA · Lakers vs Celtics</button>
          <button class="match-btn" data-match="c94d7e01-333d-41cd-a67d-cc0285fa7f28">WC26 · England vs Brazil</button>
        </div>
        <p id="runtime" class="runtime"></p>
      </section>

      <main id="preview" class="stack"></main>
    </div>
  </div>

  <script>
    const BASE_URL = '/api/demo-match-context';
    const previewEl = document.getElementById('preview');
    const runtimeEl = document.getElementById('runtime');
    const sections = ['match', 'teams', 'market', 'opening_lines', 'injuries', 'intel'];

    document.querySelectorAll('.match-btn').forEach((button) => {
      button.addEventListener('click', () => {
        document.querySelectorAll('.match-btn').forEach((x) => x.classList.remove('active'));
        button.classList.add('active');
        loadMatch(button.dataset.match);
      });
    });

    function formatNumber(value, digits = 1) {
      if (typeof value !== 'number' || !Number.isFinite(value)) return 'n/a';
      return value.toFixed(digits);
    }

    function freshnessBadge(status) {
      const normalized = typeof status === 'string' ? status.toLowerCase() : 'unavailable';
      const cls = normalized === 'fresh' ? 'status-fresh' : normalized === 'stale' ? 'status-older' : 'status-unavailable';
      const label = normalized === 'fresh' ? 'updated' : normalized === 'stale' ? 'older' : 'missing';
      return `<span class="status ${cls}">${label}</span>`;
    }

    function renderMetaCard(data) {
      const match = data.match || {};
      const home = data.teams?.home || { name: 'Home', score: null };
      const away = data.teams?.away || { name: 'Away', score: null };
      const kickoff = new Date(match.start_time);

      return `
        <section class="card">
          <h2>Match</h2>
          <div class="status-row">
            ${freshnessBadge(data.metadata?.data_freshness?.match?.status)}
            <span>${match.league || 'League'} · ${String(match.status || 'scheduled').replaceAll('_', ' ')}</span>
          </div>
          <div class="matchup-title">${home.name} vs ${away.name}</div>
          <dl class="meta">
            <div class="meta-item"><dt>Kickoff</dt><dd>${Number.isNaN(kickoff.getTime()) ? 'TBD' : kickoff.toLocaleString()}</dd></div>
            <div class="meta-item"><dt>Score</dt><dd>${home.score ?? '-'} : ${away.score ?? '-'}</dd></div>
            <div class="meta-item"><dt>Source ID</dt><dd style="font-family: var(--mono);">${match.source_id || 'n/a'}</dd></div>
          </dl>
        </section>
      `;
    }

    function renderLineAnchor(data) {
      const opening = data.opening_lines?.lines?.[0] || null;
      const total = opening?.total;
      const spread = opening?.spread;
      const card = data.intel?.cards?.[0] || null;
      const note = card?.detail || data.intel?.pick_summary || 'No line-anchor summary in this response.';

      return `
        <section class="card">
          <h2>Line Anchor</h2>
          <div class="line-anchor">
            <div class="pill"><span class="label">Total</span><span class="value">${total == null ? 'n/a' : formatNumber(total)}</span></div>
            <div class="pill"><span class="label">Spread</span><span class="value">${spread == null ? 'n/a' : formatNumber(spread, 2)}</span></div>
            <div class="pill"><span class="label">Pick</span><span class="value" style="font-size:16px">${data.intel?.recommended_pick || 'n/a'}</span></div>
          </div>
          <p class="muted">${note}</p>
        </section>
      `;
    }

    function renderMarket(data) {
      if (!data.market?.available) {
        return '<section class="card"><h2>Market</h2><p class="muted">Market data is not available for this match.</p></section>';
      }

      const c = data.market.consensus || {};
      return `
        <section class="card">
          <h2>Market ${freshnessBadge(data.metadata?.data_freshness?.match?.status)}</h2>
          <table>
            <thead>
              <tr><th>Field</th><th>Value</th></tr>
            </thead>
            <tbody>
              <tr><td>Spread</td><td class="mono">${c.spread == null ? 'n/a' : c.spread}</td></tr>
              <tr><td>Total</td><td class="mono">${c.total == null ? 'n/a' : c.total}</td></tr>
              <tr><td>Home ML</td><td class="mono">${c.home_ml == null ? 'n/a' : c.home_ml}</td></tr>
              <tr><td>Away ML</td><td class="mono">${c.away_ml == null ? 'n/a' : c.away_ml}</td></tr>
              <tr><td>Draw ML</td><td class="mono">${c.draw_ml == null ? 'n/a' : c.draw_ml}</td></tr>
            </tbody>
          </table>
        </section>
      `;
    }

    function renderIntel(data) {
      if (!data.intel?.available) {
        return '<section class="card"><h2>Intel</h2><p class="muted">No pregame intel is available for this match.</p></section>';
      }

      const cards = (data.intel.cards || []).map((card) => `<li><strong>${card.title || 'Card'}:</strong> ${card.detail || 'n/a'}</li>`);

      return `
        <section class="card">
          <h2>Intel ${freshnessBadge(data.metadata?.data_freshness?.intel?.status)}</h2>
          <p class="muted">${data.intel.headline || 'Pregame context'}</p>
          <ul class="list">
            <li><strong>Recommended pick:</strong> ${data.intel.recommended_pick || 'n/a'}</li>
            <li><strong>Confidence tier:</strong> ${data.intel.confidence_tier || 'n/a'}</li>
            <li><strong>Summary:</strong> ${data.intel.pick_summary || 'n/a'}</li>
            ${cards.join('')}
          </ul>
        </section>
      `;
    }

    function renderInjuries(data, homeName, awayName) {
      if (!data.injuries?.available) {
        return '<section class="card"><h2>Injuries</h2><p class="muted">Injury data is not available for this match.</p></section>';
      }

      const homeRows = (data.injuries.home || []).map((p) => `${homeName}: ${p.player_name} (${p.status})`);
      const awayRows = (data.injuries.away || []).map((p) => `${awayName}: ${p.player_name} (${p.status})`);
      const rows = [...homeRows, ...awayRows].slice(0, 12);

      return `
        <section class="card">
          <h2>Injuries ${freshnessBadge(data.metadata?.data_freshness?.injuries?.status)}</h2>
          ${rows.length === 0 ? '<p class="muted">No listed injuries in this response.</p>' : `<ul class="list">${rows.map((row) => `<li>${row}</li>`).join('')}</ul>`}
        </section>
      `;
    }

    function renderAvailability(data) {
      const sectionFlags = data.metadata?.sections_available || {};
      const items = sections.map((key) => `<li>${key.replace('_', ' ')}: <strong>${sectionFlags[key] ? 'ready' : 'not included'}</strong></li>`);

      return `
        <section class="card">
          <h2>What Came Back In This Call</h2>
          <ul class="list">${items.join('')}</ul>
        </section>
      `;
    }

    function renderPage(data) {
      const home = data.teams?.home || { name: 'Home' };
      const away = data.teams?.away || { name: 'Away' };

      previewEl.innerHTML = [
        renderMetaCard(data),
        renderLineAnchor(data),
        renderMarket(data),
        renderIntel(data),
        renderInjuries(data, home.name, away.name),
        renderAvailability(data)
      ].join('');
    }

    async function loadMatch(matchId) {
      previewEl.innerHTML = '<div class="loading">Pulling match context...</div>';
      runtimeEl.textContent = '';

      try {
        const started = performance.now();
        const response = await fetch(`${BASE_URL}?match_id=${matchId}`);
        const payload = await response.json();
        const elapsed = Math.round(performance.now() - started);

        if (!response.ok || payload.error) {
          const message = payload?.error?.message || `Request failed (${response.status})`;
          previewEl.innerHTML = `<div class="error">${message}</div>`;
          return;
        }

        runtimeEl.textContent = `loaded ${elapsed}ms via demo proxy · response ${payload.metadata?.response_time_ms ?? 'n/a'}ms · updated ${new Date(payload.metadata?.generated_at || Date.now()).toLocaleTimeString()}`;
        renderPage(payload);
      } catch (error) {
        previewEl.innerHTML = `<div class="error">${error.message || 'Could not load this match.'}</div>`;
      }
    }

    loadMatch('b193b51f-cbed-4398-a297-237dd3322607');
  </script>
</body>
</html>
