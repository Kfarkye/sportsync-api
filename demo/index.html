<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SportsSync Match Context Demo</title>
  <meta name="description" content="Interactive demo of one SportsSync match-context response rendered as a real page.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,600;6..72,700&family=Public+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8f6f1;
      --panel: #ffffff;
      --panel-soft: #f3efe6;
      --border: #e3dccd;
      --text: #1f1d18;
      --muted: #5f574a;
      --accent: #0f6b5f;
      --good: #1b7a3b;
      --warn: #9a6a14;
      --bad: #8b2d2d;
      --body: "Public Sans", "Avenir Next", sans-serif;
      --display: "Newsreader", Georgia, serif;
      --mono: "JetBrains Mono", "SF Mono", Menlo, monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--body);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 920px;
      margin: 0 auto;
      padding: 0 20px 28px;
    }

    header {
      padding: 20px 0;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .brand {
      color: var(--text);
      text-decoration: none;
      font-family: var(--display);
      font-size: 30px;
      font-weight: 700;
    }

    .back {
      font-size: 14px;
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }

    .hero {
      padding: 24px 0 14px;
    }

    .hero h1 {
      font-family: var(--display);
      font-size: clamp(32px, 5.6vw, 52px);
      line-height: 1.06;
      margin-bottom: 8px;
    }

    .hero p {
      color: var(--muted);
      max-width: 60ch;
    }

    .controls {
      margin: 16px 0 20px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .match-btn {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .match-btn.active {
      border-color: var(--accent);
      background: var(--panel-soft);
      color: var(--accent);
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #cf2e2e;
      flex-shrink: 0;
    }

    .live-label {
      font-size: 11px;
      letter-spacing: 0.04em;
      color: #cf2e2e;
      font-weight: 700;
      text-transform: uppercase;
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel);
      padding: 16px;
    }

    .card h2 {
      font-size: 17px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .matchup-title {
      font-family: var(--display);
      font-size: 40px;
      line-height: 1.03;
      margin-bottom: 6px;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .meta-item {
      background: var(--panel-soft);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 8px;
    }

    .meta-item dt {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 2px;
    }

    .meta-item dd {
      font-size: 14px;
      color: var(--text);
      font-weight: 600;
      margin: 0;
    }

    .line-anchor {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 8px;
    }

    .line-anchor .pill {
      background: var(--panel-soft);
      border: 1px solid var(--border);
      border-radius: 9px;
      padding: 10px;
    }

    .line-anchor .label {
      display: block;
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 2px;
    }

    .line-anchor .value {
      font-family: var(--mono);
      font-size: 22px;
      color: var(--text);
    }

    .line-note {
      font-size: 14px;
      color: var(--muted);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      text-align: left;
      padding: 9px 6px;
      border-bottom: 1px solid var(--border);
    }

    th {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 700;
    }

    td.mono { font-family: var(--mono); }

    .muted { color: var(--muted); }

    .status {
      display: inline-flex;
      align-items: center;
      font-size: 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      padding: 4px 9px;
      font-family: var(--mono);
    }

    .status-ready {
      color: var(--good);
      border-color: #c6e2cf;
      background: #eff8f2;
    }

    .status-missing {
      color: var(--bad);
      border-color: #e8c2c2;
      background: #fbefef;
    }

    .list {
      list-style: none;
      display: grid;
      gap: 8px;
    }

    .list li {
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--panel-soft);
      font-size: 15px;
    }

    .form-grid {
      display: grid;
      gap: 8px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .form-side {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel-soft);
      padding: 10px;
    }

    .form-team {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .form-string {
      display: inline-flex;
      gap: 4px;
      margin-bottom: 6px;
      font-family: var(--mono);
      font-size: 13px;
    }

    .form-char { font-weight: 700; }
    .form-char.win { color: var(--good); }
    .form-char.loss { color: var(--bad); }
    .form-char.draw { color: var(--warn); }
    .form-char.other { color: var(--muted); }

    .form-metrics {
      display: grid;
      gap: 4px;
      font-size: 13px;
      color: var(--text);
    }

    .loading,
    .error {
      padding: 18px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel);
      color: var(--muted);
      font-size: 14px;
    }

    .error { color: var(--bad); }

    @media (max-width: 760px) {
      .meta,
      .line-anchor,
      .form-grid {
        grid-template-columns: 1fr;
      }

      .matchup-title {
        font-size: 34px;
      }

      th, td {
        padding-left: 4px;
        padding-right: 4px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <a class="brand" href="/">SportsSync</a>
      <a class="back" href="/">Back to main site</a>
    </header>

    <section class="hero">
      <h1>Live Match Context Demo</h1>
      <p>Pick a match and watch one response render into a usable game view.</p>
    </section>

    <div id="match-controls" class="controls"></div>
    <main id="preview" class="stack">
      <div class="loading">Loading matches...</div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://qffzvrnbzabcokqqrwbv.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFmZnp2cm5iemFiY29rcXFyd2J2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTUzNTc2NjgsImV4cCI6MjA3MDkzMzY2OH0.PCSnC5E7sG7FvasHy_9DdwiN61xW0GzFROLzZ0bTVnc';

    const leagueShort = {
      'eng.1': 'EPL',
      'esp.1': 'La Liga',
      'ita.1': 'Serie A',
      'ger.1': 'Bundesliga',
      'fra.1': 'Ligue 1',
      nba: 'NBA',
      nhl: 'NHL',
      'mens-college-basketball': 'NCAAB',
      'uefa.champions': 'UCL',
      'uefa.europa': 'UEL',
      'usa.1': 'MLS',
    };

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    const controlsEl = document.getElementById('match-controls');
    const previewEl = document.getElementById('preview');

    function escapeHtml(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function toNumber(value) {
      if (typeof value === 'number' && Number.isFinite(value)) return value;
      if (typeof value === 'string' && value.trim().length > 0) {
        const parsed = Number(value);
        return Number.isFinite(parsed) ? parsed : null;
      }
      return null;
    }

    function formatNumber(value, digits = 1) {
      const numeric = toNumber(value);
      if (numeric === null) return 'n/a';
      return numeric.toFixed(digits);
    }

    function isLive(status) {
      const normalized = String(status || '').toUpperCase();
      return normalized.includes('IN_PROGRESS') || normalized === 'LIVE';
    }

    function formatLeague(leagueId) {
      return leagueShort[leagueId] || leagueId || 'League';
    }

    function getOddsValue(odds, keys) {
      if (!odds || typeof odds !== 'object') return null;
      for (const key of keys) {
        if (Object.hasOwn(odds, key) && odds[key] !== null && odds[key] !== undefined) {
          return odds[key];
        }
      }
      return null;
    }

    function marketReady(currentOdds) {
      const total = getOddsValue(currentOdds, ['total']);
      const homeSpread = getOddsValue(currentOdds, ['home_spread', 'homeSpread']);
      const homeMl = getOddsValue(currentOdds, ['home_ml', 'homeML']);
      return total !== null || homeSpread !== null || homeMl !== null;
    }

    function computeRollingAverage(form) {
      if (!form) return null;

      const homeScored = toNumber(form.home?.avg_scored);
      const awayScored = toNumber(form.away?.avg_scored);
      if (homeScored !== null && awayScored !== null) {
        return Number((homeScored + awayScored).toFixed(1));
      }

      const homeTotal = toNumber(form.home?.avg_total);
      if (homeTotal !== null) return Number(homeTotal.toFixed(1));

      return null;
    }

    function setActiveButton(matchId) {
      controlsEl.querySelectorAll('.match-btn').forEach((btn) => {
        btn.classList.toggle('active', btn.dataset.matchId === matchId);
      });
    }

    function renderButtons(matches) {
      controlsEl.innerHTML = '';

      for (const match of matches) {
        const button = document.createElement('button');
        button.type = 'button';
        button.className = 'match-btn';
        button.dataset.matchId = match.match_id;

        const label = `${formatLeague(match.league_id)} · ${match.home_team} vs ${match.away_team}`;
        button.innerHTML = `<span>${escapeHtml(label)}</span>${
          isLive(match.status)
            ? '<span class="live-dot" aria-hidden="true"></span><span class="live-label">LIVE</span>'
            : ''
        }`;

        button.addEventListener('click', () => {
          setActiveButton(match.match_id);
          loadMatchBrief(match.match_id);
        });

        controlsEl.appendChild(button);
      }
    }

    function renderMetaCard(brief) {
      const match = brief.match || {};
      const home = match.home_team || brief.form?.home?.team || 'Home';
      const away = match.away_team || brief.form?.away?.team || 'Away';
      const kickoff = new Date(match.start_time);

      return `
        <section class="card">
          <h2>Match</h2>
          <div class="matchup-title">${escapeHtml(home)} vs ${escapeHtml(away)}</div>
          <p class="muted">${escapeHtml(formatLeague(match.league_id))} · ${escapeHtml(String(match.status || 'scheduled').replaceAll('_', ' '))}</p>
          <dl class="meta">
            <div class="meta-item"><dt>Kickoff</dt><dd>${Number.isNaN(kickoff.getTime()) ? 'TBD' : kickoff.toLocaleString()}</dd></div>
            <div class="meta-item"><dt>Score</dt><dd>${match.home_score ?? '-'} : ${match.away_score ?? '-'}</dd></div>
            <div class="meta-item"><dt>Match ID</dt><dd class="mono">${escapeHtml(match.id || 'n/a')}</dd></div>
          </dl>
        </section>
      `;
    }

    function renderLineAnchor(brief) {
      const currentOdds = brief.match?.current_odds || {};
      const line = toNumber(getOddsValue(currentOdds, ['total']));
      const average = computeRollingAverage(brief.form || null);
      const gap = average !== null && line !== null ? Number((average - line).toFixed(1)) : null;

      let lineText = 'Line anchor needs both form average and market total.';
      if (gap !== null) {
        if (gap === 0) {
          lineText = `Average is ${formatNumber(average)}. Line is ${formatNumber(line)}. They are aligned.`;
        } else {
          const direction = gap > 0 ? 'above' : 'below';
          lineText = `Average is ${formatNumber(average)}. Line is ${formatNumber(line)}. That's ${formatNumber(Math.abs(gap))} ${direction}.`;
        }
      }

      return `
        <section class="card">
          <h2>Line Anchor</h2>
          <div class="line-anchor">
            <div class="pill"><span class="label">Rolling Average</span><span class="value">${average === null ? 'n/a' : formatNumber(average)}</span></div>
            <div class="pill"><span class="label">Tonight's Line</span><span class="value">${line === null ? 'n/a' : formatNumber(line)}</span></div>
            <div class="pill"><span class="label">Gap</span><span class="value">${gap === null ? 'n/a' : `${gap > 0 ? '+' : ''}${formatNumber(gap)}`}</span></div>
          </div>
          <p class="line-note">${lineText}</p>
        </section>
      `;
    }

    function renderMarket(brief) {
      const currentOdds = brief.match?.current_odds || {};
      const ready = marketReady(currentOdds);
      const badge = `<span class="status ${ready ? 'status-ready' : 'status-missing'}">${ready ? 'ready' : 'missing'}</span>`;

      const total = getOddsValue(currentOdds, ['total']);
      const homeSpread = getOddsValue(currentOdds, ['home_spread', 'homeSpread']);
      const awaySpread = getOddsValue(currentOdds, ['away_spread', 'awaySpread']);
      const homeMl = getOddsValue(currentOdds, ['home_ml', 'homeML']);
      const awayMl = getOddsValue(currentOdds, ['away_ml', 'awayML']);
      const provider = getOddsValue(currentOdds, ['provider']) || 'n/a';

      return `
        <section class="card">
          <h2>Market ${badge}</h2>
          <table>
            <thead>
              <tr><th>Field</th><th>Value</th></tr>
            </thead>
            <tbody>
              <tr><td>Total</td><td class="mono">${total === null ? 'n/a' : escapeHtml(total)}</td></tr>
              <tr><td>Home Spread</td><td class="mono">${homeSpread === null ? 'n/a' : escapeHtml(homeSpread)}</td></tr>
              <tr><td>Away Spread</td><td class="mono">${awaySpread === null ? 'n/a' : escapeHtml(awaySpread)}</td></tr>
              <tr><td>Home ML</td><td class="mono">${homeMl === null ? 'n/a' : escapeHtml(homeMl)}</td></tr>
              <tr><td>Away ML</td><td class="mono">${awayMl === null ? 'n/a' : escapeHtml(awayMl)}</td></tr>
              <tr><td>Provider</td><td>${escapeHtml(provider)}</td></tr>
            </tbody>
          </table>
        </section>
      `;
    }

    function renderFormString(formString) {
      if (!formString || typeof formString !== 'string') return '<span class="muted">n/a</span>';
      const chars = formString.trim().toUpperCase().split('');
      return chars.map((ch) => {
        let cls = 'other';
        if (ch === 'W') cls = 'win';
        if (ch === 'L') cls = 'loss';
        if (ch === 'D') cls = 'draw';
        return `<span class="form-char ${cls}">${ch}</span>`;
      }).join('');
    }

    function renderRecord(row) {
      const wins = toNumber(row?.wins);
      const draws = toNumber(row?.draws);
      const losses = toNumber(row?.losses);

      if (wins === null && draws === null && losses === null) return 'n/a';

      const winPart = `${wins ?? 0}W`;
      const drawPart = draws && draws > 0 ? ` ${draws}D` : '';
      const lossPart = `${losses ?? 0}L`;
      return `${winPart}${drawPart} ${lossPart}`.trim();
    }

    function renderFormSide(label, row) {
      if (!row) {
        return `
          <div class="form-side">
            <div class="form-team">${escapeHtml(label)}</div>
            <p class="muted">No form data available</p>
          </div>
        `;
      }

      return `
        <div class="form-side">
          <div class="form-team">${escapeHtml(row.team || label)}</div>
          <div class="form-string">${renderFormString(row.form_string)}</div>
          <div class="form-metrics">
            <div><strong>Record:</strong> ${escapeHtml(renderRecord(row))}</div>
            <div><strong>Avg Scored:</strong> ${formatNumber(row.avg_scored)}</div>
            <div><strong>Avg Conceded:</strong> ${formatNumber(row.avg_conceded)}</div>
          </div>
        </div>
      `;
    }

    function renderForm(brief) {
      const home = brief.form?.home || null;
      const away = brief.form?.away || null;

      return `
        <section class="card">
          <h2>Form</h2>
          <div class="form-grid">
            ${renderFormSide('Home', home)}
            ${renderFormSide('Away', away)}
          </div>
        </section>
      `;
    }

    function renderInjuries(brief) {
      const homeRows = Array.isArray(brief.injuries?.home) ? brief.injuries.home : [];
      const awayRows = Array.isArray(brief.injuries?.away) ? brief.injuries.away : [];
      const rows = [...homeRows, ...awayRows].slice(0, 10);

      return `
        <section class="card">
          <h2>Injuries</h2>
          ${rows.length === 0
            ? '<p class="muted">No listed injuries in this response.</p>'
            : `<ul class="list">${rows.map((row) => `<li>${escapeHtml(row.player || row.name || row.fullName || 'Player')} (${escapeHtml(row.status || 'unknown')})</li>`).join('')}</ul>`}
        </section>
      `;
    }

    function renderPage(brief) {
      previewEl.innerHTML = [
        renderMetaCard(brief),
        renderLineAnchor(brief),
        renderMarket(brief),
        renderForm(brief),
        renderInjuries(brief),
      ].join('');
    }

    async function loadMatchBrief(matchId) {
      previewEl.innerHTML = '<div class="loading">Loading match data...</div>';

      try {
        const { data, error } = await supabaseClient.rpc('get_ai_match_brief', { p_match_id: matchId });

        if (error) {
          throw new Error(error.message || 'Could not load this match.');
        }

        if (!data || typeof data !== 'object') {
          throw new Error('No match brief returned.');
        }

        renderPage(data);
      } catch (error) {
        previewEl.innerHTML = `<div class="error">${escapeHtml(error.message || 'Could not load this match.')}</div>`;
      }
    }

    async function loadDemoMatches() {
      controlsEl.innerHTML = '<div class="loading">Loading match options...</div>';

      try {
        const { data, error } = await supabaseClient.rpc('get_demo_matches', { p_limit: 4 });

        if (error) {
          throw new Error(error.message || 'Could not load demo matches.');
        }

        const matches = Array.isArray(data) ? data : [];
        if (matches.length === 0) {
          controlsEl.innerHTML = '<div class="error">No demo matches available right now.</div>';
          previewEl.innerHTML = '';
          return;
        }

        renderButtons(matches);
        const firstMatchId = matches[0].match_id;
        setActiveButton(firstMatchId);
        await loadMatchBrief(firstMatchId);
      } catch (error) {
        controlsEl.innerHTML = `<div class="error">${escapeHtml(error.message || 'Could not load demo matches.')}</div>`;
        previewEl.innerHTML = '<div class="error">Could not load match preview.</div>';
      }
    }

    loadDemoMatches();
  </script>
</body>
</html>
